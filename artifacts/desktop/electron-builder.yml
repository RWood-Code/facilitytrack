appId: nz.facilitytrack.desktop
productName: FacilityTrack
copyright: Copyright © 2026 FacilityTrack
directories:
  output: release
  buildResources: assets

# We invoke @electron/rebuild ourselves via the `rebuild:electron` npm
# script (see package.json) BEFORE vendor:copy runs. That way the
# Electron-ABI better-sqlite3 binary is the one that gets vendored into
# resources/api-server/dist/node_modules/. Letting electron-builder run
# its own rebuild pass on top of that would either be redundant or could
# mutate desktop/node_modules in a way that no longer matches what we
# already vendored. Disable it.
npmRebuild: false

# Files inside `app.asar`. Only the Electron main bundle and package.json.
# Workspace packages (@workspace/api-server etc.) are NOT bundled here —
# they are copied into vendor/ by scripts/vendor-copy.mjs before this runs,
# then included via extraResources below. This avoids electron-builder
# following pnpm workspace symlinks outside the desktop folder, which it
# refuses to do.
files:
  - "dist/**"
  - "package.json"
  - "!**/*.map"

# Renderer, API server output, and DB migrations are copied into vendor/
# by scripts/vendor-copy.mjs (called from the dist:win script) before
# electron-builder runs. All paths stay inside artifacts/desktop/ so
# electron-builder never needs to resolve symlinks to sibling workspaces.
# Exclude build artifacts, source maps, and other non-runtime files.
extraResources:
  - from: "vendor/facilitytrack/dist/public"
    to: "facilitytrack/dist/public"
    filter:
      - "**/*"
      - "!**/*.map"
  - from: "vendor/api-server"
    to: "api-server/dist"
    filter:
      - "**/*"
      - "!**/*.map"
      - "!**/.replit-artifact/**"
      - "!**/src/**"
      - "!**/dist/src/**"
  - from: "vendor/db/drizzle"
    to: "lib/db/drizzle"
    filter:
      - "**/*"
      - "!**/*.map"

asarUnpack:
  # better-sqlite3 ships native .node binaries that must live outside asar.
  - "**/node_modules/better-sqlite3/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "FacilityTrack-Setup-${version}.${ext}"
  # NOTE: `icon:` intentionally omitted — no branded .ico file exists yet.
  # electron-builder will use its default Electron icon. Add a real
  # `assets/icon.ico` (256x256 multi-resolution) before the first signed
  # customer release and uncomment a line like:
  #   icon: assets/icon.ico
  #
  # Code-signing fields (`certificateFile`, `certificatePassword`) are
  # intentionally NOT declared here. The wrapper at
  # scripts/sign-and-build.mjs sets `WIN_CSC_LINK` and `WIN_CSC_KEY_PASSWORD`
  # in the environment when a real cert was decoded from
  # `WIN_CSC_LINK_B64`; electron-builder picks those env vars up and signs
  # natively. When neither env var is set (local dev or `ALLOW_UNSIGNED=1`
  # test builds) electron-builder skips signing instead of failing on a
  # placeholder path — which is what would happen if we left
  # `certificateFile: ${env.WIN_CSC_FILE}` declared and the env var was
  # empty.
  signingHashAlgorithms:
    - sha256
  # RFC 3161 timestamp server. Counter-signs the Authenticode signature
  # with a trusted timestamp so installers stay valid after the
  # code-signing certificate expires — Windows trusts the signature as
  # long as the cert was valid *at the time of signing*. Without this,
  # customers who install FacilityTrack post-cert-expiry would see
  # SmartScreen/UAC treat the binary as unsigned. DigiCert's timestamp
  # service is free and widely trusted; swap for `http://timestamp.sectigo.com`
  # if DigiCert is ever unreachable from the build environment.
  rfc3161TimeStampServer: http://timestamp.digicert.com
  # Must match the CN on the certificate. Update if the cert is reissued
  # under a different legal name.
  publisherName: FacilityTrack Limited
  # Verify the embedded signature on auto-updates so a rotated/expired
  # cert doesn't silently break the update channel.
  verifyUpdateCodeSignature: true

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FacilityTrack
  uninstallDisplayName: FacilityTrack ${version}

# `electron-updater` reads this and writes `app-update.yml` into the packaged
# app — the URL below is what running installs poll for `latest.yml` and
# download the installer from. The provider stays `generic` (download-only)
# on purpose: the customer-facing URL is a stable custom domain, decoupled
# from whichever S3-compatible bucket happens to back it (AWS S3, Cloudflare
# R2, DigitalOcean Spaces, etc.). If we used `s3` here directly,
# electron-builder would bake the bucket's own URL into `app-update.yml` and
# every storage migration would orphan existing installs.
#
# Uploading new releases to that bucket is handled by the
# `Publish installer to customer update feed` step in
# `.github/workflows/desktop-release.yml` — see that file's header for the
# required CI secrets.
publish:
  - provider: generic
    url: https://updates.facilitytrack.co.nz/desktop
    channel: latest
