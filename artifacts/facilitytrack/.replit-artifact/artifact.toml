kind = "web"
previewPath = "/"
title = "FacilityTrack"
version = "1.0.0"
id = "artifacts/facilitytrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20890

[services.development]
run = "pnpm --filter @workspace/facilitytrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/facilitytrack", "run", "build" ]
publicDir = "artifacts/facilitytrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20890"
BASE_PATH = "/"
