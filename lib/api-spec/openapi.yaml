openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FacilityTrack Aquatic Operations API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pools
    description: Pool management
  - name: facilities
    description: Facility management
  - name: test-results
    description: Pool water test results
  - name: water-balance
    description: Water balance tests
  - name: pool-closures
    description: Pool closure logs
  - name: steam-room
    description: Steam room checks
  - name: work-orders
    description: Work orders
  - name: assets
    description: Asset management
  - name: maintenance-schedules
    description: Maintenance schedules
  - name: staff
    description: Staff management
  - name: staff-qualifications
    description: Staff qualifications
  - name: training-records
    description: Training records
  - name: notifications
    description: Notifications
  - name: app-users
    description: App user management
  - name: dashboard
    description: Dashboard summary data
  - name: reports
    description: Reports and exports
  - name: audit-logs
    description: Audit log of changes to records

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── FACILITIES ──────────────────────────────────────────────────────────────
  /facilities:
    get:
