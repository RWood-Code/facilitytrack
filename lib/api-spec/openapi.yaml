              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Facility"
    post:
      operationId: createFacility
      tags: [facilities]
      summary: Create a facility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFacilityBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facility"

  /facilities/{id}:
